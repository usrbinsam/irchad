name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            shell: bash
          - os: windows-latest
            platform: windows
            shell: msys2 {0}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        if: matrix.platform == 'linux'
        with:
          go-version: "1.26"
          cache-dependency-path: app/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        if: matrix.platform == 'linux'
        with:
          node-version: 24

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-good1.0-dev \
            libgstreamer-plugins-bad1.0-dev \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-plugins-rtp \
            gstreamer1.0-plugins-base-apps \
            gstreamer1.0-pipewire

      - name: Setup MSYS2
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: "minimal"
          install: >-
            mingw-w64-x86_64-crt-git
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gdb
            mingw-w64-x86_64-gdb-multiarch
            mingw-w64-x86_64-go
            mingw-w64-x86_64-headers-git
            mingw-w64-x86_64-libmangle-git
            mingw-w64-x86_64-libwinpthread
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-tools-git
            mingw-w64-x86_64-winpthreads
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-base
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad
            mingw-w64-x86_64-gst-plugins-rs
            mingw-w64-x86_64-gst-plugins-ugly
            mingw-w64-x86_64-gst-libav
            mingw-w64-x86_64-nodejs

      - name: Build Application
        working-directory: app/
        run: |
          RAW_GOPATH=$(go env GOPATH)
          if [[ "$OSTYPE" == "msys" || "$OSTYPE" == "cygwin" ]]; then
            GOPATH_UNIX=$(cygpath -u "$RAW_GOPATH")
            export PATH="$PATH:$GOPATH_UNIX/bin"
          else
            export PATH="$PATH:$RAW_GOPATH/bin"
          fi

          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

          wails3 generate bindings -d frontend/src/bindings -ts -names
          wails3 build

          go install github.com/google/go-licenses@latest
          mkdir -p bundle/licenses/go-deps
          go-licenses save . --save_path="bundle/licenses/go-deps" --force || true
          mv bin/* bundle/

      - name: Bundle GStreamer DLLs
        if: matrix.platform == 'windows'
        working-directory: app/
        run: |
          ldd bundle/IrChad.exe | grep "mingw64" | awk '{print $3}' | xargs -I {} cp {} bundle/
          mkdir -p bundle/lib/gstreamer-1.0
          cp /mingw64/lib/gstreamer-1.0/*.dll bundle/lib/gstreamer-1.0/

      - name: Compress Bundle
        run: |
          tar cJf irchad-${{ matrix.platform }}.tar.xz bundle/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: irchad-${{ matrix.platform }}
          path: |
            app/bundle/*

      - name: Create Release and Upload Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/bundle*.tar.xz
          generate_release_notes: true
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
